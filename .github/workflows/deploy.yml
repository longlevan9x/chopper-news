name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Chạy Database Migrations trước khi Deploy?'
        required: true
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}

jobs:
  build:
    name: 🏗️ Build & Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Notify Telegram (Start)
        if: always()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || 'Triển khai thủ công' }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
        run: |
          MESSAGE="🚀 <b>[Khởi chạy Deploy] Chopper-News</b>
          👤 <b>Người đẩy:</b> $ACTOR
          📝 <b>Commit:</b> <i>$COMMIT_MSG</i>
          🔀 <b>Nhánh:</b> $BRANCH
          ⏳ <i>Đang đóng gói Server kiểm thử (Job 1/2)...</i>"
          
          bash scripts/tele_notify.sh "$MESSAGE"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build

      - name: Notify Telegram (Build Status)
        if: success()
        run: bash scripts/tele_notify.sh "✅ (1/2) Build Code TypeScript thành công! Chuyển sang Job Deploy..."

      - name: Notify Telegram (Failed Build)
        if: failure()
        run: bash scripts/tele_notify.sh "❌ Lỗi khi Build code! Quá trình Pipeline bị hủy ngang."

  deploy:
    name: 🚀 Deploy to Cloudflare
    needs: build
    runs-on: ubuntu-latest
    env:
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Check Migration Configuration
        id: check_migration
        run: |
          if [ -f "migration.json" ]; then
            CURRENT=$(jq -r '.current' migration.json)
            PREVIOUS=$(jq -r '.previous' migration.json)
            echo "Tìm thấy migration.json. Current: $CURRENT, Previous: $PREVIOUS"
            if [ "$CURRENT" -gt "$PREVIOUS" ]; then
              echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
            else
              echo "SHOULD_RUN=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "SHOULD_RUN=false" >> $GITHUB_OUTPUT
          fi

      - name: Apply DB Migrations
        id: apply_db
        if: steps.check_migration.outputs.SHOULD_RUN == 'true' || github.event.inputs.run_migrations == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply chopper-news-db --remote

      - name: Notify Telegram (Migration)
        if: steps.apply_db.conclusion == 'success'
        run: bash scripts/tele_notify.sh "🗄 Update CSDL cấu trúc (D1 Migrations) thành công!"
        
      - name: Prepare Dynamic Secrets List
        id: prep_secrets
        run: |
          {
            echo 'ACTIVE_SECRETS<<EOF'
            echo "TELEGRAM_BOT_TOKEN"
            if [ -n "$GOOGLE_GENERATIVE_AI_API_KEY" ]; then echo "GOOGLE_GENERATIVE_AI_API_KEY"; fi
            if [ -n "$GROQ_API_KEY" ]; then echo "GROQ_API_KEY"; fi
            if [ -n "$XAI_API_KEY" ]; then echo "XAI_API_KEY"; fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Workers
        id: wrangler_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: ${{ steps.prep_secrets.outputs.ACTIVE_SECRETS }}

      - name: Auto-Set Telegram Webhook
        if: success()
        run: |
          # Lấy URL trực tiếp từ kết quả bước Deploy phía trên
          WEBHOOK_TARGET="${{ steps.wrangler_deploy.outputs.deployment-url }}/webhook"
          
          if [ -n "${{ steps.wrangler_deploy.outputs.deployment-url }}" ]; then
            RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook?url=${WEBHOOK_TARGET}")
            bash scripts/tele_notify.sh "🔗 <b>Tự động nối Webhook:</b> <code>$WEBHOOK_TARGET</code>%0A🔹 <b>Telegram báo:</b> <i>$RESPONSE</i>"
          else
            bash scripts/tele_notify.sh "⚠️ <b>Lỗi:</b> Không lấy được URL từ Cloudflare để tự động Set Webhook."
          fi

      - name: Notify Telegram (Done)
        if: success()
        run: bash scripts/tele_notify.sh "🎉 (2/2) Hoàn tất đưa Code lên Cloudflare Edge!"

      - name: Notify Telegram (Failed)
        if: failure()
        run: bash scripts/tele_notify.sh "❌ <b>CẢNH BÁO:</b> Quá trình chạy máy chủ Deploy bị lỗi! Vui lòng xem log Cloudflare."
